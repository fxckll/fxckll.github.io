<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles_log.css">
    <script src="assets/js/main_log.js"></script>
    <title>REGISTRO</title>
</head>

<body>
    <form action="" method="dialog" id="form">

        <h1>Registrate</h1>

        <div class="caja">
            <input type="text" id="user"><span class="barra"></span>
            <label for="user">Usuario</label>
        </div>

        <div class="caja">
            <input type="text" id="name"><span class="barra"></span>
            <label for="name">Nombre</label>
        </div>

        <div class="caja">
            <input type="email" id="email"><span class="barra"></span>
            <label for="email">Correo Electronico</label>
        </div>

        <div class="caja">
            <input type="password" id="password"><span class="barra"></span>
            <label for="email">Password</label>
        </div>

        <button onclick="pass()">Registrarse</button>

        <p class="warnings" id="warnings"></p>
    </form>

    <form action="" id="ingresar" method="dialog">
        <h1>Ingresar</h1>

        <div class="caja">
            <input type="text" id="usuario"><span class="barra"></span>
            <label for="user">Usuario</label>
        </div>

        <div class="caja">
            <input type="password" id="pass"><span class="barra"></span>
            <label for="email">Password</label>
        </div>

        <button onclick="ingresar()">Ingresar</button>

    </form>
</body>

</html>
